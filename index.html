<!DOCTYPE html>
<html>
<head>
    <title>Ohm App</title>

    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        header{
            text-align:center;
            padding:20px;
            font-size:24px;
            font-weight:bold;
        }

        .app{
            display:flex;
            justify-content:center;
            padding:20px;
        }

        .container{
            background:white;
            color:black;
            width:350px;
            border-radius:20px;
            padding:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-size:20px;
            font-weight:bold;
            margin-bottom:10px;
        }

        img{
            width:100%;
            border-radius:10px;
        }

        .formulas{
            display:flex;
            justify-content:space-around;
            margin-top:10px;
        }

        .formula{
            background:#f1f5f9;
            padding:8px;
            border-radius:10px;
            font-weight:bold;
        }

        select, input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:10px;
            border:none;
            background:#f1f5f9;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:12px;
            background: linear-gradient(135deg,#ff7a18,#ffb347);
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .result{
            margin-top:15px;
            padding:15px;
            border-radius:10px;
            background:#e0f2fe;
            text-align:center;
            font-weight:bold;
        }

        .steps{
            margin-top:10px;
        }

        .step{
            background:#f8fafc;
            padding:10px;
            border-radius:8px;
            margin-top:5px;
            font-size:14px;
        }

        .step b{
            color:#6366f1;
        }

    </style>
</head>

<body>

<header>⚡ Ohm Calculator App</header>

<div class="app">
    <div class="container">

        <div class="title">Ley de Ohm</div>

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Ohm%27s_Law_Pie_chart.svg/512px-Ohm%27s_Law_Pie_chart.svg.png">

        <div class="formulas">
            <div class="formula">V = I × R</div>
            <div class="formula">I = V / R</div>
            <div class="formula">R = V / I</div>
        </div>

        <select id="tipo">
            <option value="I">Corriente</option>
            <option value="V">Voltaje</option>
            <option value="R">Resistencia</option>
        </select>

        <input id="v" placeholder="Voltaje (V)">
        <input id="i" placeholder="Corriente (A)">
        <input id="r" placeholder="Resistencia (Ω)">

        <button onclick="calcular()">Calcular</button>

        <div class="result" id="resultado"></div>

        <div class="steps" id="proceso"></div>

    </div>
</div>

<script>

document.getElementById("tipo").addEventListener("change", function(){

    let t=this.value;

    v.style.display="block";
    i.style.display="block";
    r.style.display="block";

    if(t=="I") i.style.display="none";
    if(t=="V") v.style.display="none";
    if(t=="R") r.style.display="none";

});

function calcular(){

    let t=tipo.value;
    let V=parseFloat(v.value);
    let I=parseFloat(i.value);
    let R=parseFloat(r.value);

    let res="";
    let steps="";

    if(t=="I"){
        if(isNaN(V)||isNaN(R)){res="⚠️ Ingresa V y R";return;}
        let x=V/R;

        res="Corriente = "+x+" A";

        steps=`
        <div class="step"><b>1.</b> I = V / R</div>
        <div class="step"><b>2.</b> I = ${V} / ${R}</div>
        <div class="step"><b>3.</b> I = ${x} A</div>
        `;
    }

    if(t=="V"){
        if(isNaN(I)||isNaN(R)){res="⚠️ Ingresa I y R";return;}
        let x=I*R;

        res="Voltaje = "+x+" V";

        steps=`
        <div class="step"><b>1.</b> V = I × R</div>
        <div class="step"><b>2.</b> V = ${I} × ${R}</div>
        <div class="step"><b>3.</b> V = ${x} V</div>
        `;
    }

    if(t=="R"){
        if(isNaN(V)||isNaN(I)){res="⚠️ Ingresa V e I";return;}
        let x=V/I;

        res="Resistencia = "+x+" Ω";

        steps=`
        <div class="step"><b>1.</b> R = V / I</div>
        <div class="step"><b>2.</b> R = ${V} / ${I}</div>
        <div class="step"><b>3.</b> R = ${x} Ω</div>
        `;
    }

    resultado.innerHTML=res;
    proceso.innerHTML=steps;

}

</script>

</body>
</html>
